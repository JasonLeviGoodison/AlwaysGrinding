name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build zipapp
        run: python scripts/build_zipapp.py
      - name: Generate checksum
        run: sha256sum dist/lid-guard.pyz > dist/lid-guard.pyz.sha256
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lid-guard.pyz
            dist/lid-guard.pyz.sha256
